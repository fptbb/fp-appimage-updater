[package]
name = "fp-appimage-updater"
version = "1.1.1"
edition = "2024"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
clap_complete = "4.5"
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1.0"
reqwest = { version = "0.12", features = ["json", "blocking", "rustls-tls"], default-features = false }
tokio = { version = "1.43", features = ["full"] }
directories = "5.0"
comfy-table = "7.1"
anyhow = "1.0"
glob = "0.3"
sha2 = "0.10"
hex = "0.4"
rust-ini = "0.20"

[profile.release]
opt-level = "z"      # Optimize for size
lto = true           # Enable Link-Time Optimization
codegen-units = 1    # Maximize size optimization efficiency
panic = "abort"      # Remove panic unwinding logic to save space
strip = true         # Strip symbols from binary

[dev-dependencies]
testcontainers = { version = "0.23.1", features = ["http_wait"] }
testcontainers-modules = "0.11.0"
tokio = { version = "1.43", features = ["macros", "rt-multi-thread"] }
