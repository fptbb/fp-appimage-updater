spec:
  inputs:
    force_release:
      description: "Force a release on manual trigger"
      type: boolean
      default: false
    force_pages:
      description: "Force pages rebuild on manual trigger"
      type: boolean
      default: false
    prerelease:
      description: "Publish as pre-release (appends -RC<N> to the version tag)"
      type: boolean
      default: false
    categorize:
      description: "Categorize commits by prefix (feat, fix, etc.)"
      type: boolean
      default: false
    show_authors:
      description: "Show commit authors"
      type: boolean
      default: false
    include_commits:
      description: "Include commit log in release notes"
      type: boolean
      default: true
---
stages:
  - build
  - release
  - pages

variables:
  GIT_DEPTH: 0
  FORCE_RELEASE: "$[[ inputs.force_release ]]"
  FORCE_PAGES: "$[[ inputs.force_pages ]]"
  PRERELEASE: "$[[ inputs.prerelease ]]"
  CATEGORIZE: "$[[ inputs.categorize ]]"
  SHOW_AUTHORS: "$[[ inputs.show_authors ]]"
  INCLUDE_COMMITS: "$[[ inputs.include_commits ]]"

build-and-compress:
  stage: build
  image: rust:latest
  variables:
    RUNNER_GENERATE_ARTIFACTS_METADATA: "true"
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - .cargo/git/db/
      - target/
  before_script:
    - apt-get update && apt-get install -y upx-ucl jq curl wget python3-pip
    - pip install ziglang cargo-zigbuild --break-system-packages
    - ln -s $(which python-zig) /usr/local/bin/zig
    - wget -O /usr/local/bin/cosign https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
    - chmod +x /usr/local/bin/cosign
    - rustup target add x86_64-unknown-linux-gnu x86_64-unknown-linux-musl aarch64-unknown-linux-gnu aarch64-unknown-linux-musl
  script:
    - mkdir -p build
    - cargo run --features schema-gen -- generate-schema global > build/schema-global.json
    - cargo run --features schema-gen -- generate-schema recipe > build/schema-recipe.json
    - cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.28
    - cargo zigbuild --release --target x86_64-unknown-linux-musl
    - cargo zigbuild --release --target aarch64-unknown-linux-gnu.2.28
    - cargo zigbuild --release --target aarch64-unknown-linux-musl
    - upx --best --lzma target/x86_64-unknown-linux-gnu/release/fp-appimage-updater
    - upx --best --lzma target/x86_64-unknown-linux-musl/release/fp-appimage-updater
    - upx --best --lzma target/aarch64-unknown-linux-gnu/release/fp-appimage-updater
    - upx --best --lzma target/aarch64-unknown-linux-musl/release/fp-appimage-updater
    - mkdir -p build
    - mv target/x86_64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.x64
    - mv target/x86_64-unknown-linux-musl/release/fp-appimage-updater build/fp-appimage-updater.x64-musl
    - mv target/aarch64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.ARM
    - mv target/aarch64-unknown-linux-musl/release/fp-appimage-updater build/fp-appimage-updater.ARM-musl
    - cd build && sha256sum fp-appimage-updater.x64 fp-appimage-updater.x64-musl fp-appimage-updater.ARM fp-appimage-updater.ARM-musl > checksums.txt && cd ..
    - cosign sign-blob --yes build/fp-appimage-updater.x64 --bundle build/fp-appimage-updater.x64.bundle
    - cosign sign-blob --yes build/fp-appimage-updater.x64-musl --bundle build/fp-appimage-updater.x64-musl.bundle
    - cosign sign-blob --yes build/fp-appimage-updater.ARM --bundle build/fp-appimage-updater.ARM.bundle
    - cosign sign-blob --yes build/fp-appimage-updater.ARM-musl --bundle build/fp-appimage-updater.ARM-musl.bundle
  artifacts:
    paths:
      - build/
      - systemd/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH
      changes:
        - "src/**/*"
        - "tests/**/*"
        - "scripts/**/*"
        - "systemd/**/*"
        - "vendor/**/*"
        - ".cargo/**/*"
        - "Cargo.*"
        - "*.sh"
        - "copr.spec"
        - "Justfile"
        - ".gitlab-ci.yml"

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-and-compress
      artifacts: true
  before_script:
    - apk add --no-cache git bash grep sed gawk curl
  script:
    - bash scripts/gitlab/release.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main" && $FORCE_RELEASE == "true"
    - if: $CI_COMMIT_MESSAGE =~ /^chore:\s*bump\s*version\s*to\s*.*\s*in\s*Cargo\.toml/ && $CI_COMMIT_BRANCH == "main"

pages:
  stage: pages
  image: alpine:latest
  needs:
    - job: build-and-compress
      artifacts: true
  script:
    - sh scripts/gitlab/pages.sh
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && ($FORCE_PAGES == "true" || $FORCE_RELEASE == "true")
    - if: $CI_COMMIT_MESSAGE =~ /^chore:\s*bump\s*version\s*to\s*.*\s*in\s*Cargo\.toml/ && $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - install.sh
        - install-github.sh
        - scripts/gitlab/pages.sh
        - src/**/*
        - Cargo.toml
        - .gitlab-ci.yml
