name: Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for release (e.g., v1.0.0). Leave empty to only build an artifact.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build & Compress
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y upx-ucl gcc-aarch64-linux-gnu
        
      - name: Build x64 Release Binary
        run: cargo build --release --target x86_64-unknown-linux-gnu
        
      - name: Build ARM64 Release Binary
        run: cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        
      - name: Apply UPX Compression
        run: |
          upx --best --lzma target/x86_64-unknown-linux-gnu/release/fp-appimage-updater
          upx --best --lzma target/aarch64-unknown-linux-gnu/release/fp-appimage-updater
        
      - name: Stage Artifacts
        run: |
          mkdir -p build
          mv target/x86_64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.x64
          mv target/aarch64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.ARM

      - name: Upload x64 Artifact
        if: ${{ inputs.version == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: fp-appimage-updater-linux-x64
          path: build/fp-appimage-updater.x64
          retention-days: 7

      - name: Upload ARM64 Artifact
        if: ${{ inputs.version == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: fp-appimage-updater-linux-arm64
          path: build/fp-appimage-updater.ARM
          retention-days: 7

      - name: Publish GitHub Release
        if: ${{ inputs.version != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          files: |
            build/fp-appimage-updater.x64
            build/fp-appimage-updater.ARM
            systemd/fp-appimage-updater.service
            systemd/fp-appimage-updater.timer
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
