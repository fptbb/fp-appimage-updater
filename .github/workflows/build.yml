name: Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Compress
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for changelog
      
      - name: Get Version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n1 | sed -E 's/version = "(.+)"/\1/')
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check Tag Does Not Already Exist
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="v$(grep '^version' Cargo.toml | head -n1 | sed -E 's/version = "(.+)"/\1/')"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "::error::Tag ${TAG} already exists. Bump the version in Cargo.toml before releasing."
            exit 1
          fi

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y upx-ucl gcc-aarch64-linux-gnu
        
      - name: Build x64 Release Binary
        run: cargo build --release --target x86_64-unknown-linux-gnu
        
      - name: Build ARM64 Release Binary
        run: cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        
      - name: Apply UPX Compression
        run: |
          upx --best --lzma target/x86_64-unknown-linux-gnu/release/fp-appimage-updater
          upx --best --lzma target/aarch64-unknown-linux-gnu/release/fp-appimage-updater
        
      - name: Stage Artifacts
        run: |
          mkdir -p build
          mv target/x86_64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.x64
          mv target/aarch64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.ARM

      - name: Upload x64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fp-appimage-updater-linux-x64
          path: build/fp-appimage-updater.x64
          retention-days: 7

      - name: Upload ARM64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fp-appimage-updater-linux-arm64
          path: build/fp-appimage-updater.ARM
          retention-days: 7

      - name: Generate Changelog
        if: github.event_name == 'workflow_dispatch'
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h) by %an" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h) by %an" "${PREV_TAG}..HEAD")
          fi
          # Write multiline output safely
          {
            echo 'notes<<EOF'
            echo "## What's Changed"
            echo "$LOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            build/fp-appimage-updater.x64
            build/fp-appimage-updater.ARM
            systemd/fp-appimage-updater.service
            systemd/fp-appimage-updater.timer
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

