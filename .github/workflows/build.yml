name: Build & Release

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'README-BR.md'
      - 'README-LA.md'
      - 'docs/**'
      - 'examples/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'README-BR.md'
      - 'README-LA.md'
      - 'docs/**'
      - 'examples/**'
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Publish as pre-release (appends -RC<N> to the version tag)'
        type: boolean
        default: false
      categorize:
        description: 'Categorize commits by prefix (feat, fix, etc.)'
        type: boolean
        default: false
      show_authors:
        description: 'Show commit authors'
        type: boolean
        default: false
      auto_publish:
        description: 'Automatically publish the release (undraft) after uploading'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build & Compress
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Get Version from Cargo.toml
        id: get_version
        run: bash scripts/github/get-version.sh

      - name: Resolve Release Metadata
        id: release_meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: bash scripts/github/release-meta.sh

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-unknown-linux-musl, aarch64-unknown-linux-gnu, aarch64-unknown-linux-musl

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      
      - name: Install cargo-zigbuild and zig
        run: |
          pip install ziglang cargo-zigbuild
          sudo ln -s $(which python-zig) /usr/local/bin/zig

      - name: Build All Release Binaries
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.28
          cargo zigbuild --release --target x86_64-unknown-linux-musl
          cargo zigbuild --release --target aarch64-unknown-linux-gnu.2.28
          cargo zigbuild --release --target aarch64-unknown-linux-musl
        
      - name: Apply UPX Compression
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl
          upx --best --lzma target/x86_64-unknown-linux-gnu/release/fp-appimage-updater
          upx --best --lzma target/x86_64-unknown-linux-musl/release/fp-appimage-updater
          upx --best --lzma target/aarch64-unknown-linux-gnu/release/fp-appimage-updater
          upx --best --lzma target/aarch64-unknown-linux-musl/release/fp-appimage-updater
        
      - name: Stage Artifacts
        run: |
          mkdir -p build
          mv target/x86_64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.x64
          mv target/x86_64-unknown-linux-musl/release/fp-appimage-updater build/fp-appimage-updater.x64-musl
          mv target/aarch64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.ARM
          mv target/aarch64-unknown-linux-musl/release/fp-appimage-updater build/fp-appimage-updater.ARM-musl
          cd build && sha256sum fp-appimage-updater.x64 fp-appimage-updater.x64-musl fp-appimage-updater.ARM fp-appimage-updater.ARM-musl > checksums.txt && cd ..

      - name: Generate Attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            build/fp-appimage-updater.x64
            build/fp-appimage-updater.x64-musl
            build/fp-appimage-updater.ARM
            build/fp-appimage-updater.ARM-musl
            build/checksums.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fp-appimage-updater-binaries
          path: |
            build/fp-appimage-updater.x64
            build/fp-appimage-updater.x64-musl
            build/fp-appimage-updater.ARM
            build/fp-appimage-updater.ARM-musl
          retention-days: 7

      - name: Resolve Release Files
        if: steps.release_meta.outputs.should_release == 'true'
        id: release_files
        run: bash scripts/github/release-files.sh

      - name: Generate Changelog
        if: steps.release_meta.outputs.should_release == 'true'
        id: changelog
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PRERELEASE: ${{ inputs.prerelease }}
          SHOW_AUTHORS: ${{ inputs.show_authors }}
          CATEGORIZE: ${{ inputs.categorize }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/github/changelog.sh

      - name: Create Release and Upload Assets
        if: steps.release_meta.outputs.should_release == 'true'
        id: create_release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: Release ${{ steps.release_meta.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: ${{ steps.release_files.outputs.files }}
          draft: ${{ steps.release_meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Draft Release
        if: |
          github.event_name == 'workflow_dispatch' && 
          github.event.inputs.auto_publish == 'true'
        run: |
          gh release edit "${{ steps.release_meta.outputs.tag }}" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
