name: Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Publish as pre-release (appends -RC<N> to the version tag)'
        type: boolean
        default: false
      categorize:
        description: 'Categorize commits by prefix (feat, fix, etc.)'
        type: boolean
        default: false
      show_authors:
        description: 'Show commit authors'
        type: boolean
        default: false
      auto_publish:
        description: 'Automatically publish the release (undraft) after uploading'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build & Compress
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Get Version from Cargo.toml
        id: get_version
        run: bash scripts/github/get-version.sh

      - name: Resolve Release Metadata
        id: release_meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: bash scripts/github/release-meta.sh

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      
      # I hate this...
      - name: Install System Dependencies
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/Types: deb/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          cat <<EOF | sudo tee /etc/apt/sources.list.d/arm64.sources
          Types: deb
          Architectures: arm64
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: noble noble-updates noble-backports noble-security
          Components: main universe restricted multiverse
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update
          sudo apt-get install -y upx-ucl gcc-aarch64-linux-gnu pkg-config libssl-dev:arm64
        
      - name: Build x64 Release Binary
        run: cargo build --release --target x86_64-unknown-linux-gnu
        
      - name: Build ARM64 Release Binary
        run: cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH_aarch64_unknown_linux_gnu: "/usr/lib/aarch64-linux-gnu/pkgconfig"
        
      - name: Apply UPX Compression
        run: |
          upx --best --lzma target/x86_64-unknown-linux-gnu/release/fp-appimage-updater
          upx --best --lzma target/aarch64-unknown-linux-gnu/release/fp-appimage-updater
        
      - name: Stage Artifacts
        run: |
          mkdir -p build
          mv target/x86_64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.x64
          mv target/aarch64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.ARM
          cd build && sha256sum fp-appimage-updater.x64 fp-appimage-updater.ARM > checksums.txt && cd ..

      - name: Generate Attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            build/fp-appimage-updater.x64
            build/fp-appimage-updater.ARM
            build/checksums.txt

      - name: Upload x64 Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fp-appimage-updater-linux-x64
          path: build/fp-appimage-updater.x64
          retention-days: 7

      - name: Upload ARM64 Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fp-appimage-updater-linux-arm64
          path: build/fp-appimage-updater.ARM
          retention-days: 7

      - name: Resolve Release Files
        if: steps.release_meta.outputs.should_release == 'true'
        id: release_files
        run: bash scripts/github/release-files.sh

      - name: Generate Changelog
        if: steps.release_meta.outputs.should_release == 'true'
        id: changelog
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PRERELEASE: ${{ inputs.prerelease }}
          SHOW_AUTHORS: ${{ inputs.show_authors }}
          CATEGORIZE: ${{ inputs.categorize }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/github/changelog.sh

      - name: Create Release and Upload Assets
        if: steps.release_meta.outputs.should_release == 'true'
        id: create_release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: Release ${{ steps.release_meta.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: ${{ steps.release_files.outputs.files }}
          draft: ${{ steps.release_meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Draft Release
        if: |
          github.event_name == 'workflow_dispatch' && 
          github.event.inputs.auto_publish == 'true'
        run: |
          gh release edit "${{ steps.release_meta.outputs.tag }}" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
