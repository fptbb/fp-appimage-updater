name: Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Publish as pre-release (appends -RC<N> to the version tag)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build & Compress
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.resolve_tag.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for changelog

      - name: Get Version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n1 | sed -E 's/version = "(.+)"/\1/')
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Resolve Tag
        if: github.event_name == 'workflow_dispatch'
        id: resolve_tag
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n1 | sed -E 's/version = "(.+)"/\1/')
          BASE_TAG="v${VERSION}"

          if [ "${{ inputs.prerelease }}" = "true" ]; then
            # Refuse to create an RC for a version that is already stable
            if git ls-remote --tags origin | grep -q "refs/tags/${BASE_TAG}$"; then
              echo "::error::Stable tag ${BASE_TAG} already exists. Bump the version in Cargo.toml before creating a new pre-release."
              exit 1
            fi
            # Find the highest existing RC number for this version using git ls-remote
            HIGHEST=$(git ls-remote --tags origin \
              | grep -oP "refs/tags/${BASE_TAG}-RC\K[0-9]+" \
              | sort -n | tail -1)
            if [ -z "$HIGHEST" ]; then
              NEXT_RC=1
            else
              NEXT_RC=$((HIGHEST + 1))
            fi
            TAG="${BASE_TAG}-RC${NEXT_RC}"
          else
            TAG="${BASE_TAG}"
            # For stable releases, ensure the tag doesn't already exist
            if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
              echo "::error::Tag ${TAG} already exists. Bump the version in Cargo.toml before releasing."
              exit 1
            fi
          fi

          echo "Resolved tag: ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y upx-ucl gcc-aarch64-linux-gnu
        
      - name: Build x64 Release Binary
        run: cargo build --release --target x86_64-unknown-linux-gnu
        
      - name: Build ARM64 Release Binary
        run: cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        
      - name: Apply UPX Compression
        run: |
          upx --best --lzma target/x86_64-unknown-linux-gnu/release/fp-appimage-updater
          upx --best --lzma target/aarch64-unknown-linux-gnu/release/fp-appimage-updater
        
      - name: Stage Artifacts
        run: |
          mkdir -p build
          mv target/x86_64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.x64
          mv target/aarch64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.ARM

      - name: Upload x64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fp-appimage-updater-linux-x64
          path: build/fp-appimage-updater.x64
          retention-days: 7

      - name: Upload ARM64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fp-appimage-updater-linux-arm64
          path: build/fp-appimage-updater.ARM
          retention-days: 7

      - name: Generate Changelog
        if: github.event_name == 'workflow_dispatch'
        id: changelog
        run: |
          HEAD_SHA=$(git rev-parse --short HEAD)

          if [ "${{ inputs.prerelease }}" = "true" ]; then
            # Pre-release: diff from the nearest preceding tag (stable or RC)
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          else
            # Stable release: skip all RC tags to get the last stable tag,
            # so the changelog covers everything since the previous real release
            PREV_TAG=$(git tag --sort=-creatordate | grep -v -- '-RC' | head -1)
          fi

          if [ -z "$PREV_TAG" ]; then
            BASE_SHA=$(git rev-list --max-parents=0 HEAD --abbrev-commit)
            ALL_COMMITS=$(git log --pretty=format:"- %s (%h) by %an" HEAD)
          else
            BASE_SHA=$(git rev-parse --short "${PREV_TAG}")
            ALL_COMMITS=$(git log --pretty=format:"- %s (%h) by %an" "${PREV_TAG}..HEAD")
          fi

          HEADER="## What's Changed"
          RANGE="*(from ${BASE_SHA} to ${HEAD_SHA})*"
          MAX=120000
          TOTAL=$(echo "$ALL_COMMITS" | wc -l)

          # Reserve space for header, range line, and the potential "...and N more" suffix
          AVAILABLE=$((MAX - ${#HEADER} - ${#RANGE} - 35))

          COUNT=0
          USED=0
          LOG=""
          while IFS= read -r line; do
            NEED=$((USED + ${#line} + 1))
            if [ $NEED -le $AVAILABLE ]; then
              LOG="${LOG}${line}"$'\n'
              USED=$((USED + ${#line} + 1))
              COUNT=$((COUNT + 1))
            else
              break
            fi
          done <<< "$ALL_COMMITS"

          REMAINING=$((TOTAL - COUNT))
          if [ $REMAINING -gt 0 ]; then
            LOG="${LOG}...and ${REMAINING} more commits"
          fi

          {
            echo 'notes<<CHANGELOG_EOF'
            printf '%s\n%s\n%s' "$HEADER" "$RANGE" "$LOG"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: Release ${{ steps.resolve_tag.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            build/fp-appimage-updater.x64
            build/fp-appimage-updater.ARM
            systemd/fp-appimage-updater.service
            systemd/fp-appimage-updater.timer
          draft: false
          prerelease: ${{ inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
