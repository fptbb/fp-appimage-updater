name: Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Publish as pre-release (appends -RC<N> to the version tag)'
        type: boolean
        default: false
      categorize:
        description: 'Categorize commits by prefix (feat, fix, etc.)'
        type: boolean
        default: false
      show_authors:
        description: 'Show commit authors'
        type: boolean
        default: false
      auto_publish:
        description: 'Automatically publish the release (undraft) after uploading'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build & Compress
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Get Version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n1 | sed -E 's/version = "(.+)"/\1/')
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Resolve Release Metadata
        id: release_meta
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n1 | sed -E 's/version = "(.+)"/\1/')
          BASE_TAG="v${VERSION}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            HEAD_MESSAGE=$(git log -1 --pretty=%s | tr -d '\r')
            EXPECTED_MESSAGE="chore: bump version to ${VERSION} in Cargo.toml"

            if [ "$HEAD_MESSAGE" = "$EXPECTED_MESSAGE" ]; then
              if git ls-remote --tags origin | grep -q "refs/tags/${BASE_TAG}$"; then
                echo "::error::Stable tag ${BASE_TAG} already exists. Bump the version in Cargo.toml before pushing a new release commit."
                exit 1
              fi

              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"
              echo "draft=false" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            fi
          else
            if [ "${{ inputs.prerelease }}" = "true" ]; then
              # Refuse to create an RC for a version that is already stable
              if git ls-remote --tags origin | grep -q "refs/tags/${BASE_TAG}$"; then
                echo "::error::Stable tag ${BASE_TAG} already exists. Bump the version in Cargo.toml before creating a new pre-release."
                exit 1
              fi
              # Find the highest existing RC number for this version using git ls-remote
              HIGHEST=$(git ls-remote --tags origin \
                | grep -oP "refs/tags/${BASE_TAG}-RC\K[0-9]+" \
                | sort -n | tail -1)
              if [ -z "$HIGHEST" ]; then
                NEXT_RC=1
              else
                NEXT_RC=$((HIGHEST + 1))
              fi
              TAG="${BASE_TAG}-RC${NEXT_RC}"
            else
              TAG="${BASE_TAG}"
              # For stable releases, ensure the tag doesn't already exist
              if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
                echo "::error::Tag ${TAG} already exists. Bump the version in Cargo.toml before releasing."
                exit 1
              fi
            fi

            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      
      # I hate this...
      - name: Install System Dependencies
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/Types: deb/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          cat <<EOF | sudo tee /etc/apt/sources.list.d/arm64.sources
          Types: deb
          Architectures: arm64
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: noble noble-updates noble-backports noble-security
          Components: main universe restricted multiverse
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update
          sudo apt-get install -y upx-ucl gcc-aarch64-linux-gnu pkg-config libssl-dev:arm64
        
      - name: Build x64 Release Binary
        run: cargo build --release --target x86_64-unknown-linux-gnu
        
      - name: Build ARM64 Release Binary
        run: cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH_aarch64_unknown_linux_gnu: "/usr/lib/aarch64-linux-gnu/pkgconfig"
        
      - name: Apply UPX Compression
        run: |
          upx --best --lzma target/x86_64-unknown-linux-gnu/release/fp-appimage-updater
          upx --best --lzma target/aarch64-unknown-linux-gnu/release/fp-appimage-updater
        
      - name: Stage Artifacts
        run: |
          mkdir -p build
          mv target/x86_64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.x64
          mv target/aarch64-unknown-linux-gnu/release/fp-appimage-updater build/fp-appimage-updater.ARM
          cd build && sha256sum fp-appimage-updater.x64 fp-appimage-updater.ARM > checksums.txt && cd ..

      - name: Generate Attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            build/fp-appimage-updater.x64
            build/fp-appimage-updater.ARM
            build/checksums.txt

      - name: Upload x64 Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fp-appimage-updater-linux-x64
          path: build/fp-appimage-updater.x64
          retention-days: 7

      - name: Upload ARM64 Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fp-appimage-updater-linux-arm64
          path: build/fp-appimage-updater.ARM
          retention-days: 7

      - name: Generate Changelog
        if: steps.release_meta.outputs.should_release == 'true'
        id: changelog
        shell: bash
        run: |
          HEAD_SHA=$(git rev-parse --short HEAD)
          
          # Determine previous tag
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          else
            PREV_TAG=$(git tag --sort=-creatordate | grep -v -- '-RC' | head -1)
          fi

          # Set Base SHA and Comparison URL
          if [ -z "$PREV_TAG" ]; then
            BASE_SHA=$(git rev-list --max-parents=0 HEAD --abbrev-commit)
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${BASE_SHA}...${HEAD_SHA}"
            RANGE_SPEC="HEAD"
          else
            BASE_SHA=$(git rev-parse --short "${PREV_TAG}")
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${HEAD_SHA}"
            RANGE_SPEC="${PREV_TAG}..HEAD"
          fi

          # Format string based on author toggle
          if [ "${{ github.event.inputs.show_authors }}" = "false" ]; then
            FORMAT="- %s (%h)"
          else
            FORMAT="- %s (%h) by %an"
          fi

          # Logic for Categorization vs Simple List
          if [ "${{ github.event.inputs.categorize }}" = "true" ]; then
            LOG_CONTENT=""
            declare -A COMMIT_GROUPS
            # handles grouping by prefix case-insensitively
            while IFS= read -r line; do
              # Extract prefix or default to 'other'
              PREFIX=$(echo "$line" | grep -oP "^- \K[^: ]+(?=:)" | tr '[:upper:]' '[:lower:]' || echo "other")
              COMMIT_GROUPS["$PREFIX"]="${COMMIT_GROUPS["$PREFIX"]}$line"$'\n'
            done < <(git log --pretty=format:"$FORMAT" "$RANGE_SPEC")

            # Build the categorized log
            for KEY in "${!COMMIT_GROUPS[@]}"; do
              # Title case the header
              HEADER_KEY="$(tr '[:lower:]' '[:upper:]' <<< ${KEY:0:1})${KEY:1}"
              LOG_CONTENT="${LOG_CONTENT}### $HEADER_KEY"$'\n'"${COMMIT_GROUPS[$KEY]}"$'\n'
            done
          else
            LOG_CONTENT=$(git log --pretty=format:"$FORMAT" "$RANGE_SPEC")
          fi

          HEADER="## What's Changed"
          RANGE="**Full Changelog**: [${BASE_SHA}...${HEAD_SHA}](${COMPARE_URL})"
          
          {
            echo 'notes<<CHANGELOG_EOF'
            echo "$HEADER"
            echo "$RANGE"
            echo ""
            echo "$LOG_CONTENT"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release and Upload Assets
        if: steps.release_meta.outputs.should_release == 'true'
        id: create_release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: Release ${{ steps.release_meta.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            build/fp-appimage-updater.x64
            build/fp-appimage-updater.ARM
            build/checksums.txt
            systemd/fp-appimage-updater.service
            systemd/fp-appimage-updater.timer
          draft: ${{ steps.release_meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Draft Release
        if: |
          github.event_name == 'workflow_dispatch' && 
          github.event.inputs.auto_publish == 'true'
        run: |
          gh release edit "${{ steps.release_meta.outputs.tag }}" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
